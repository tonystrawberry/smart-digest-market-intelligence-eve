<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 480" font-family="system-ui, sans-serif">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#334155"/>
    </marker>
    <marker id="arrBack" markerWidth="8" markerHeight="8" refX="1" refY="4" orient="auto">
      <path d="M8,0 L0,4 L8,8 Z" fill="#64748b"/>
    </marker>
    <style>
      .actor { font-size: 12px; font-weight: 600; fill: #0f172a; }
      .msg { font-size: 10px; fill: #334155; }
      .line { stroke: #cbd5e1; stroke-width: 1; stroke-dasharray: 4 4; }
      .arrow { stroke: #475569; stroke-width: 1.5; fill: none; }
      .arrowRet { stroke: #64748b; stroke-width: 1.5; fill: none; stroke-dasharray: 5 3; }
    </style>
  </defs>
  <text x="390" y="22" text-anchor="middle" font-size="13" font-weight="700" fill="#0f172a">Tool layer: fetch_tech_news and fetch_youtube_videos</text>

  <text x="60" y="50" class="actor">gemini-2.5-flash</text>
  <text x="200" y="50" class="actor">Eve runtime</text>
  <text x="340" y="50" class="actor">hn.algolia.com</text>
  <text x="500" y="50" class="actor">youtube-config.ts</text>
  <text x="660" y="50" class="actor">YouTube RSS</text>

  <line x1="80" y1="58" x2="80" y2="450" class="line"/>
  <line x1="220" y1="58" x2="220" y2="450" class="line"/>
  <line x1="360" y1="58" x2="360" y2="450" class="line"/>
  <line x1="540" y1="58" x2="540" y2="450" class="line"/>
  <line x1="680" y1="58" x2="680" y2="450" class="line"/>

  <line x1="80" y1="80" x2="220" y2="80" class="arrow" marker-end="url(#arr)"/>
  <text x="90" y="74" class="msg">fetch_tech_news {}</text>
  <line x1="220" y1="100" x2="360" y2="100" class="arrow" marker-end="url(#arr)"/>
  <text x="230" y="94" class="msg">GET front_page x15</text>
  <line x1="360" y1="120" x2="220" y2="120" class="arrowRet" marker-end="url(#arrBack)"/>
  <text x="240" y="114" class="msg">JSON hits</text>
  <line x1="220" y1="140" x2="80" y2="140" class="arrowRet" marker-end="url(#arrBack)"/>
  <text x="90" y="134" class="msg">{ stories[], fetchedAt }</text>

  <line x1="80" y1="190" x2="220" y2="190" class="arrow" marker-end="url(#arr)"/>
  <text x="90" y="184" class="msg">fetch_youtube_videos {}</text>
  <line x1="220" y1="210" x2="540" y2="210" class="arrow" marker-end="url(#arr)"/>
  <text x="280" y="204" class="msg">getYoutubeChannelIds()</text>
  <line x1="540" y1="230" x2="220" y2="230" class="arrowRet" marker-end="url(#arrBack)"/>
  <text x="280" y="224" class="msg">UC channel IDs</text>

  <rect x="230" y="250" width="320" height="120" fill="#f8fafc" stroke="#94a3b8" rx="6"/>
  <text x="240" y="268" font-size="10" fill="#64748b">loop each channelId</text>
  <line x1="220" y1="290" x2="680" y2="290" class="arrow" marker-end="url(#arr)"/>
  <text x="350" y="284" class="msg">GET feeds/videos.xml?channel_id=</text>
  <line x1="680" y1="310" x2="220" y2="310" class="arrowRet" marker-end="url(#arrBack)"/>
  <text x="350" y="304" class="msg">Atom XML</text>

  <line x1="220" y1="390" x2="80" y2="390" class="arrowRet" marker-end="url(#arrBack)"/>
  <text x="90" y="384" class="msg">{ videos[], fetchedAt, channelsChecked }</text>
</svg>
