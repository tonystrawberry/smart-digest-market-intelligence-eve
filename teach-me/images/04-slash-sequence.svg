<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 400" font-family="system-ui, sans-serif">
  <defs>
    <marker id="fwd" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#334155"/>
    </marker>
    <marker id="ret" markerWidth="8" markerHeight="8" refX="1" refY="4" orient="auto">
      <path d="M8,0 L0,4 L8,8 Z" fill="#64748b"/>
    </marker>
    <style>
      .actor { font-size: 11px; font-weight: 600; fill: #0f172a; }
      .msg { font-size: 9px; fill: #334155; }
      .life { stroke: #cbd5e1; stroke-dasharray: 4 4; }
      .a { stroke: #475569; stroke-width: 1.5; fill: none; }
      .r { stroke: #64748b; stroke-width: 1.5; fill: none; stroke-dasharray: 5 3; }
    </style>
  </defs>
  <text x="380" y="20" text-anchor="middle" font-size="13" font-weight="700" fill="#0f172a">/digest slash command - Discord 3-second ACK</text>

  <text x="40" y="48" class="actor">User</text>
  <text x="150" y="48" class="actor">Discord</text>
  <text x="280" y="48" class="actor">discord.ts</text>
  <text x="410" y="48" class="actor">Eve</text>
  <text x="530" y="48" class="actor">Gemini</text>

  <line x1="55" y1="54" x2="55" y2="370" class="life"/>
  <line x1="165" y1="54" x2="165" y2="370" class="life"/>
  <line x1="295" y1="54" x2="295" y2="370" class="life"/>
  <line x1="425" y1="54" x2="425" y2="370" class="life"/>
  <line x1="545" y1="54" x2="545" y2="370" class="life"/>

  <line x1="55" y1="75" x2="165" y2="75" class="a" marker-end="url(#fwd)"/><text x="70" y="69" class="msg">/digest</text>
  <line x1="165" y1="95" x2="295" y2="95" class="a" marker-end="url(#fwd)"/><text x="175" y="89" class="msg">POST /eve/v1/discord (signed)</text>
  <line x1="295" y1="115" x2="165" y2="115" class="r" marker-end="url(#ret)"/><text x="175" y="109" class="msg">DEFERRED ack (under 3s)</text>
  <line x1="295" y1="145" x2="425" y2="145" class="a" marker-end="url(#fwd)"/><text x="305" y="139" class="msg">session: /digest + DIGEST_PROMPT</text>
  <line x1="425" y1="175" x2="545" y2="175" class="a" marker-end="url(#fwd)"/><text x="435" y="169" class="msg">tool loop + synthesis</text>
  <line x1="545" y1="205" x2="425" y2="205" class="r" marker-end="url(#ret)"/><text x="435" y="199" class="msg">markdown digest</text>
  <line x1="425" y1="235" x2="165" y2="235" class="a" marker-end="url(#fwd)"/><text x="175" y="229" class="msg">editOriginalResponse / followup</text>
</svg>
