<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 420" font-family="system-ui, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#475569"/>
    </marker>
    <style>
      .title { font-size: 13px; font-weight: 700; fill: #0f172a; }
      .label { font-size: 11px; fill: #1e293b; }
      .sub { font-size: 10px; fill: #64748b; }
      .box { fill: #f8fafc; stroke: #94a3b8; stroke-width: 1.5; }
      .group { fill: none; stroke: #cbd5e1; stroke-width: 1.5; stroke-dasharray: 4 3; }
      .gtitle { font-size: 11px; font-weight: 600; fill: #475569; }
    </style>
  </defs>
  <text x="460" y="24" text-anchor="middle" class="title">Smart Digest architecture (repo files labeled)</text>

  <rect class="group" x="20" y="40" width="200" height="130" rx="10"/>
  <text x="30" y="58" class="gtitle">Triggers</text>
  <rect class="box" x="35" y="68" width="170" height="28" rx="6"/><text x="45" y="86" class="label">daily-digest.ts</text>
  <rect class="box" x="35" y="102" width="170" height="28" rx="6"/><text x="45" y="120" class="label">/digest - discord.ts</text>
  <rect class="box" x="35" y="136" width="170" height="28" rx="6"/><text x="45" y="154" class="label">POST dev/schedules/...</text>

  <rect class="group" x="250" y="40" width="280" height="200" rx="10"/>
  <text x="260" y="58" class="gtitle">Eve runtime (agent/)</text>
  <rect class="box" x="265" y="68" width="250" height="32" rx="6"/><text x="275" y="84" class="label">agent.ts</text><text x="275" y="96" class="sub">gemini-2.5-flash</text>
  <rect class="box" x="265" y="108" width="120" height="28" rx="6"/><text x="275" y="126" class="label">instructions.md</text>
  <rect class="box" x="395" y="108" width="120" height="28" rx="6"/><text x="405" y="126" class="label">research.md</text>
  <rect class="box" x="265" y="144" width="250" height="36" rx="6"/><text x="275" y="162" class="label">fetch_tech_news.ts</text><text x="275" y="174" class="sub">fetch_youtube_videos.ts</text>
  <rect class="box" x="265" y="188" width="250" height="40" rx="6"/><text x="275" y="206" class="label">Discord API</text><text x="275" y="220" class="sub">POST /eve/v1/discord</text>

  <rect class="group" x="560" y="40" width="340" height="130" rx="10"/>
  <text x="570" y="58" class="gtitle">External APIs</text>
  <rect class="box" x="575" y="68" width="150" height="28" rx="6"/><text x="585" y="86" class="label">hn.algolia.com</text>
  <rect class="box" x="735" y="68" width="150" height="28" rx="6"/><text x="745" y="86" class="label">youtube.com RSS</text>
  <rect class="box" x="575" y="102" width="310" height="28" rx="6"/><text x="585" y="120" class="label">Google Generative AI (Gemini)</text>

  <line x1="210" y1="96" x2="265" y2="84" stroke="#475569" marker-end="url(#arrow)"/>
  <line x1="210" y1="116" x2="265" y2="208" stroke="#475569" marker-end="url(#arrow)"/>
  <line x1="210" y1="150" x2="265" y2="84" stroke="#475569" marker-end="url(#arrow)"/>
  <line x1="515" y1="162" x2="575" y2="82" stroke="#475569" marker-end="url(#arrow)"/>
  <line x1="515" y1="168" x2="735" y2="82" stroke="#475569" marker-end="url(#arrow)"/>
  <line x1="515" y1="88" x2="575" y2="116" stroke="#475569" marker-end="url(#arrow)"/>
  <path d="M120,130 L120,208 L265,208" fill="none" stroke="#475569" marker-end="url(#arrow)"/>
</svg>
