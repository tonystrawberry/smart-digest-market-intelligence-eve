<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 320" font-family="system-ui, sans-serif">
  <defs>
    <marker id="m" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#475569"/>
    </marker>
    <style>
      .box { fill: #f8fafc; stroke: #94a3b8; stroke-width: 1.5; }
      .lbl { font-size: 10px; fill: #1e293b; }
      .grp { fill: none; stroke: #cbd5e1; stroke-dasharray: 4 3; }
      .gt { font-size: 11px; font-weight: 600; fill: #475569; }
      .title { font-size: 13px; font-weight: 700; fill: #0f172a; }
    </style>
  </defs>
  <text x="410" y="22" text-anchor="middle" class="title">Production: GitHub to Vercel to external APIs</text>

  <rect class="grp" x="20" y="40" width="200" height="100" rx="10"/>
  <text x="30" y="58" class="gt">GitHub</text>
  <rect class="box" x="35" y="68" width="170" height="30" rx="6"/><text x="45" y="87" class="lbl">tonystrawberry/...-eve</text>
  <rect class="box" x="35" y="104" width="170" height="26" rx="6"/><text x="45" y="121" class="lbl">branch: master</text>

  <rect class="grp" x="260" y="40" width="240" height="180" rx="10"/>
  <text x="270" y="58" class="gt">Vercel</text>
  <rect class="box" x="275" y="68" width="210" height="30" rx="6"/><text x="285" y="87" class="lbl">npm run build (eve to Nitro)</text>
  <rect class="box" x="275" y="104" width="210" height="30" rx="6"/><text x="285" y="123" class="lbl">Serverless functions nodejs24.x</text>
  <rect class="box" x="275" y="140" width="210" height="30" rx="6"/><text x="285" y="159" class="lbl">Cron 0 8 * * * UTC</text>
  <rect class="box" x="275" y="176" width="210" height="30" rx="6"/><text x="285" y="195" class="lbl">daily-digest.ts</text>

  <rect class="grp" x="540" y="40" width="260" height="180" rx="10"/>
  <text x="550" y="58" class="gt">External</text>
  <rect class="box" x="555" y="68" width="110" height="26" rx="6"/><text x="565" y="85" class="lbl">Discord API</text>
  <rect class="box" x="675" y="68" width="110" height="26" rx="6"/><text x="685" y="85" class="lbl">Gemini API</text>
  <rect class="box" x="555" y="102" width="110" height="26" rx="6"/><text x="565" y="119" class="lbl">HN Algolia</text>
  <rect class="box" x="675" y="102" width="110" height="26" rx="6"/><text x="685" y="119" class="lbl">YouTube RSS</text>
  <rect class="box" x="555" y="140" width="230" height="30" rx="6"/><text x="565" y="159" class="lbl">...-ev.vercel.app/eve/v1/discord</text>

  <path d="M205,119 H260" stroke="#475569" stroke-width="1.5" fill="none" marker-end="url(#m)"/>
  <text x="210" y="112" class="lbl" font-size="9">push webhook</text>
  <path d="M485,119 H540" stroke="#475569" stroke-width="1.5" fill="none" marker-end="url(#m)"/>
  <path d="M485,191 L520,191 L520,81 H555" stroke="#475569" stroke-width="1.5" fill="none" marker-end="url(#m)"/>
  <path d="M485,134 L510,134 L510,81 H675" stroke="#475569" stroke-width="1.5" fill="none" marker-end="url(#m)"/>
</svg>
